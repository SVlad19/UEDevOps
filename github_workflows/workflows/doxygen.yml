name: Game Documentation

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    runs-on: windows-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Doxygen
        shell: powershell
        run: |
          choco install doxygen.install -y
          doxygen --version

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Run Doxygen
        shell: powershell
        run: |
          doxygen "${{ github.workspace }}\devops_data\Doxyfile"

      - name: Check generated documentation
        shell: powershell
        run: |
          if (-not (Test-Path "${{ github.workspace }}\Documentation\html\index.html")) {
              Write-Error "Doxygen did not generate Documentation\html\index.html"
              Get-ChildItem -Recurse "${{ github.workspace }}\Documentation" -ErrorAction SilentlyContinue
              exit 1
          }

      - name: Upload documentation
        uses: actions/upload-pages-artifact@v4
        with:
          path: Documentation/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
